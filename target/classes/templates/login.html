<!DOCTYPE html>
<html>
<head>
    <title>Member Login | Signal Hawk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">
<div class="border border-blue-500 p-8 bg-white shadow-lg">
    <h2 class="text-blue-800 font-bold mb-4">Enter your login and password</h2>
    <form>
        <div class="mb-2">Username: <input type="text" class="border p-1 w-full"></div>
        <div class="mb-4">Password: <input type="password" class="border p-1 w-full"></div>
        <button class="bg-gray-200 border px-6 py-1">Enter</button>
    </form>
    <p class="mt-4 text-[10px]">Lost your username or password? <a href="#" class="text-blue-600">Find it</a></p>
    <p class="text-[10px]">Not member yet? Click <a href="#" class="text-blue-600 underline">here</a> to register.</p>
</div>
</body>
</html>
